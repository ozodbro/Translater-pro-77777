<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inglizcha-O'zbekcha Lug'at</title>
    <style>
        /* Umumiy fonni o'rtaga keltirish */
        body {
            background-color: #2c3e50;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Tarjimon oynasi (Kalkulyator uslubida) */
        .translator-box {
            width: 100%;
            max-width: 400px;
            background-color: #34495e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.4);
            color: white;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #2ecc71;
            font-size: 24px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #bdc3c7;
        }

        /* Matn kiritish maydoni */
        textarea {
            width: 100%;
            height: 90px;
            background-color: #ecf0f1;
            border: 2px solid transparent;
            font-size: 16px;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 6px;
            resize: none;
            color: #2c3e50;
            font-weight: bold;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #2ecc71;
        }

        /* Tarjima chiquvchi blok */
        .output-box {
            background-color: #2c3e50;
            color: #2ecc71;
            min-height: 70px;
            padding: 12px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
            word-wrap: break-word;
            border: 1px solid #7f8c8d;
            box-sizing: border-box;
        }

        /* Tarjima tugmasi */
        .btn-translate {
            width: 100%;
            height: 48px;
            background-color: #2ecc71;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-translate:hover {
            background-color: #27ae60;
        }

        .btn-translate:active {
            background-color: #1abc9c;
            transform: scale(0.98);
        }

        /* Xatolik va holat matni */
        .status {
            font-size: 13px;
            color: #e74c3c;
            margin-top: 8px;
            text-align: center;
            min-height: 15px;
        }
    </style>
</head>
<body>

    <div class="translator-box">
        <h2>En ➔ Uz Tarjimon</h2>
        
        <label for="english-text">Inglizcha so'z yoki matn:</label>
        <textarea id="english-text" placeholder="So'z yoki gap kiriting..."></textarea>
        
        <button class="btn-translate" onclick="translateText()">Tarjima qilish</button>
        
        <div style="margin-top: 20px;">
            <label>O'zbekcha tarjimasi:</label>
            <div id="uzbek-text" class="output-box"></div>
        </div>
        
        <div id="status-message" class="status"></div>
    </div>

    <script>
        async function translateText() {
            const englishText = document.getElementById('english-text').value.trim();
            const uzbekOutput = document.getElementById('uzbek-text');
            const statusMessage = document.getElementById('status-message');

            // Avvalgi holatni tozalash
            statusMessage.innerText = "";

            if (!englishText) {
                statusMessage.innerText = "Iltimos, biror so'z kiriting!";
                uzbekOutput.innerText = "";
                return;
            }

            uzbekOutput.innerText = "Tarjima qilinmoqda...";

            try {
                // MyMemory bepul API-siga xavfsiz so'rov yuborish
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(englishText)}&langpair=en|uz`);
                
                if (!response.ok) {
                    throw new Error("Serverda xatolik");
                }

                const data = await response.json();

                if (data.responseData && data.responseData.translatedText) {
                    uzbekOutput.innerText = data.responseData.translatedText;
                } else {
                    uzbekOutput.innerText = "";
                    statusMessage.innerText = "Tarjima topilmadi.";
                }
            } catch (error) {
                uzbekOutput.innerText = "";
                statusMessage.innerText = "Internetga ulanishda yoki serverda xatolik yuz berdi.";
                console.error(error);
            }
        }

        // Enter tugmasi bosilganda ham tarjima qiladigan qilish
        document.getElementById('english-text').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Yangi qatorga o'tib ketmasligi uchun
                translateText();
            }
        });
    </script>

</body>
</html>
